<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>プレーオフ ブラケット | CourtSide</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700;900&family=Oswald:wght@500;700&display=swap" rel="stylesheet" />
  <style>
    :root {
      --crimson: #BF0000;
      --crimson-bright: #E60012;
      --ink: #0A0A0A;
      --ink-2: #121212;
      --ink-3: #1C1C1C;
      --line: #2A2A2A;
    }
    html, body { background: var(--ink); color: #fff; }
    body { font-family: "Noto Sans JP", system-ui, sans-serif; -webkit-font-smoothing: antialiased; }
    .font-display { font-family: "Oswald", "Noto Sans JP", sans-serif; letter-spacing: 0.02em; }
    .team-logo {
      display:flex; align-items:center; justify-content:center;
      font-family:"Oswald",sans-serif; font-weight:700; color:#fff;
    }
    a { color: inherit; }
    .skeleton { background: linear-gradient(90deg,#1c1c1c 25%,#2a2a2a 50%,#1c1c1c 75%);
      background-size:200% 100%; animation:shimmer 1.5s infinite; }
    @keyframes shimmer { 0%{background-position:200% 0} 100%{background-position:-200% 0} }

    /* ブラケット接続線 */
    .connector { position:relative; }
    .connector::after {
      content:'';
      position:absolute;
      right:-16px; top:50%;
      width:16px; height:1px;
      background: var(--line);
    }
    .connector-group { position:relative; }
    .connector-group::after {
      content:'';
      position:absolute;
      right:-16px; top:25%; bottom:25%;
      width:1px;
      background: var(--line);
    }
    /* 勝者のチーム行 */
    .team-row-leader { background: rgba(191,0,0,.08); }
    .team-row-winner { background: rgba(191,0,0,.15); }
    /* シリーズ完了 */
    .series-done .loser { opacity: 0.35; }
  </style>
</head>
<body class="min-h-screen">

<!-- TOP BAR -->
<div class="bg-black border-b border-[var(--line)] text-xs text-gray-300">
  <div class="max-w-[1280px] mx-auto px-4 py-2 flex items-center justify-between">
    <span class="hidden sm:inline">2026 NBA プレーオフ 第1ラウンド 開幕中</span>
    <div class="flex items-center gap-4">
      <a href="#" class="hover:text-white">ヘルプ</a>
      <span class="text-gray-600">|</span>
      <a href="#" class="hover:text-white">ログイン</a>
    </div>
  </div>
</div>

<!-- HEADER -->
<header class="sticky top-0 z-40 bg-black/95 backdrop-blur border-b border-[var(--line)]">
  <div class="max-w-[1280px] mx-auto px-4 h-14 flex items-center gap-4">
    <a href="index.html" class="flex items-center gap-2 shrink-0">
      <div class="w-8 h-8 bg-[var(--crimson)] rounded flex items-center justify-center font-display font-bold text-sm">C</div>
      <span class="font-display font-bold text-xl tracking-wide">Court<span class="text-[var(--crimson-bright)]">Side</span></span>
    </a>
    <nav class="hidden md:flex items-center gap-6 text-sm ml-4">
      <a href="index.html" class="text-gray-400 hover:text-white transition-colors">今日の試合</a>
      <a href="bracket.html" class="text-white font-bold border-b-2 border-[var(--crimson)] pb-0.5">ブラケット</a>
      <a href="schedule.html" class="text-gray-400 hover:text-white transition-colors">スケジュール</a>
    </nav>
  </div>
</header>

<!-- HERO -->
<div class="bg-gradient-to-b from-[#140000] to-[var(--ink)] py-8 px-4 border-b border-[var(--line)]">
  <div class="max-w-[1280px] mx-auto">
    <div class="flex items-center gap-3 mb-1">
      <div class="w-1 h-6 bg-[var(--crimson)] rounded-sm"></div>
      <h1 class="font-display font-bold text-2xl sm:text-3xl">2025–26 NBAプレーオフ</h1>
    </div>
    <p id="bracket-subtitle" class="text-sm text-gray-400 ml-4">ブラケット読み込み中...</p>
  </div>
</div>

<!-- MAIN -->
<main class="max-w-[1280px] mx-auto px-4 py-8">

  <!-- ローディング -->
  <div id="loading" class="space-y-4">
    <div class="skeleton h-6 w-48 rounded mb-6"></div>
    <div class="grid sm:grid-cols-2 gap-4">
      <div class="skeleton h-32 rounded-xl"></div>
      <div class="skeleton h-32 rounded-xl"></div>
      <div class="skeleton h-32 rounded-xl"></div>
      <div class="skeleton h-32 rounded-xl"></div>
    </div>
  </div>

  <!-- ブラケット本体 -->
  <div id="bracket-content" class="hidden space-y-12">

    <!-- EAST -->
    <section>
      <div class="flex items-center gap-2 mb-5">
        <span class="font-display font-bold text-lg text-white">EASTERN CONFERENCE</span>
        <span class="text-xs text-gray-500 font-bold tracking-widest uppercase">イースタン</span>
      </div>
      <div class="overflow-x-auto pb-4">
        <div class="flex gap-4 min-w-[680px]" id="east-bracket"></div>
      </div>
    </section>

    <!-- WEST -->
    <section>
      <div class="flex items-center gap-2 mb-5">
        <span class="font-display font-bold text-lg text-white">WESTERN CONFERENCE</span>
        <span class="text-xs text-gray-500 font-bold tracking-widest uppercase">ウエスタン</span>
      </div>
      <div class="overflow-x-auto pb-4">
        <div class="flex gap-4 min-w-[680px]" id="west-bracket"></div>
      </div>
    </section>

    <!-- NBA FINALS -->
    <section>
      <div class="flex items-center gap-2 mb-5">
        <div class="w-1 h-5 bg-yellow-500 rounded-sm"></div>
        <span class="font-display font-bold text-lg text-yellow-400">NBA FINALS</span>
      </div>
      <div id="finals-bracket" class="max-w-sm"></div>
    </section>

  </div>
</main>

<!-- FOOTER -->
<footer class="bg-black border-t border-[var(--line)] py-8 mt-12">
  <div class="max-w-[1280px] mx-auto px-4 text-center text-xs text-gray-500">
    © 2026 CourtSide. All rights reserved.
  </div>
</footer>

<script>
(function () {
  'use strict';

  const TM = {
    ATL:{n:'Hawks',        c:'Atlanta',        g:'linear-gradient(135deg,#E03A3E,#C1D32F)'},
    BOS:{n:'Celtics',      c:'Boston',         g:'linear-gradient(135deg,#007A33,#BA9653)'},
    BKN:{n:'Nets',         c:'Brooklyn',       g:'linear-gradient(135deg,#000,#CFCFCF)'},
    CHA:{n:'Hornets',      c:'Charlotte',      g:'linear-gradient(135deg,#1D1160,#00788C)'},
    CHI:{n:'Bulls',        c:'Chicago',        g:'linear-gradient(135deg,#CE1141,#000)'},
    CLE:{n:'Cavaliers',    c:'Cleveland',      g:'linear-gradient(135deg,#860038,#041E42)'},
    DAL:{n:'Mavericks',    c:'Dallas',         g:'linear-gradient(135deg,#00538C,#002B5C)'},
    DEN:{n:'Nuggets',      c:'Denver',         g:'linear-gradient(135deg,#5D76A9,#0C2340)'},
    DET:{n:'Pistons',      c:'Detroit',        g:'linear-gradient(135deg,#C8102E,#1D42BA)'},
    GSW:{n:'Warriors',     c:'Golden State',   g:'linear-gradient(135deg,#1D428A,#FFC72C)'},
    HOU:{n:'Rockets',      c:'Houston',        g:'linear-gradient(135deg,#CE1141,#000)'},
    IND:{n:'Pacers',       c:'Indiana',        g:'linear-gradient(135deg,#002D62,#FDBB30)'},
    LAC:{n:'Clippers',     c:'LA',             g:'linear-gradient(135deg,#C8102E,#1D1160)'},
    LAL:{n:'Lakers',       c:'Los Angeles',    g:'linear-gradient(135deg,#552583,#FDB927)'},
    MEM:{n:'Grizzlies',    c:'Memphis',        g:'linear-gradient(135deg,#5D76A9,#12173F)'},
    MIA:{n:'Heat',         c:'Miami',          g:'linear-gradient(135deg,#98002E,#F9A01B)'},
    MIL:{n:'Bucks',        c:'Milwaukee',      g:'linear-gradient(135deg,#00471B,#EEE1C6)'},
    MIN:{n:'Timberwolves', c:'Minnesota',      g:'linear-gradient(135deg,#0C2340,#236192)'},
    NOP:{n:'Pelicans',     c:'New Orleans',    g:'linear-gradient(135deg,#0C2340,#C8102E)'},
    NYK:{n:'Knicks',       c:'New York',       g:'linear-gradient(135deg,#006BB6,#F58426)'},
    OKC:{n:'Thunder',      c:'Oklahoma City',  g:'linear-gradient(135deg,#007AC1,#EF3B24)'},
    ORL:{n:'Magic',        c:'Orlando',        g:'linear-gradient(135deg,#0077C0,#000)'},
    PHI:{n:'76ers',        c:'Philadelphia',   g:'linear-gradient(135deg,#006BB6,#ED174C)'},
    PHX:{n:'Suns',         c:'Phoenix',        g:'linear-gradient(135deg,#1D1160,#E56020)'},
    POR:{n:'Trail Blazers',c:'Portland',       g:'linear-gradient(135deg,#E03A3E,#000)'},
    SAC:{n:'Kings',        c:'Sacramento',     g:'linear-gradient(135deg,#5A2B81,#63727A)'},
    SAS:{n:'Spurs',        c:'San Antonio',    g:'linear-gradient(135deg,#000,#C4CED4)'},
    TOR:{n:'Raptors',      c:'Toronto',        g:'linear-gradient(135deg,#CE1141,#000)'},
    UTA:{n:'Jazz',         c:'Utah',           g:'linear-gradient(135deg,#002B5C,#F9A01B)'},
    WAS:{n:'Wizards',      c:'Washington',     g:'linear-gradient(135deg,#002B5C,#E31837)'},
  };
  const tm = t => TM[t] || { n:t, c:'', g:'#333' };

  /* シリーズテキストをパース → {leader, topWins, botWins, done} */
  function parseSeries(text, topTeam, botTeam) {
    if (!text) return { topWins:0, botWins:0, leader:null, done:false };
    const tied = text.match(/tied (\d+)-(\d+)/i);
    if (tied) return { topWins:+tied[1], botWins:+tied[2], leader:null, done:false };
    const leads = text.match(/(\w+)\s+(?:leads|wins)\s+(\d+)-(\d+)/i);
    if (leads) {
      const leaderCode = leads[1].toUpperCase();
      const w1 = +leads[2], w2 = +leads[3];
      const done = w1 === 4;
      if (leaderCode === topTeam) return { topWins:w1, botWins:w2, leader:topTeam, done };
      else                        return { topWins:w2, botWins:w1, leader:leaderCode, done };
    }
    return { topWins:0, botWins:0, leader:null, done:false };
  }

  /* マッチアップカード生成 */
  function matchupCard(s, isFinalsStyle = false) {
    const top = tm(s.top), bot = tm(s.bot);
    const series = parseSeries(s.text, s.top, s.bot);
    const topLeads = series.leader === s.top;
    const botLeads = series.leader === s.bot;
    const topWinner = series.done && topLeads;
    const botWinner = series.done && botLeads;

    const teamRow = (code, meta, wins, isTop) => {
      const isLeader = isTop ? topLeads : botLeads;
      const isWinner = isTop ? topWinner : botWinner;
      const isLoser = series.done && !isWinner;
      const rowBg = isWinner ? 'team-row-winner' : isLeader ? 'team-row-leader' : '';
      return `
        <div class="flex items-center gap-3 px-4 py-3 ${rowBg} transition-colors ${isLoser ? 'loser' : ''}">
          <div class="team-logo w-9 h-9 rounded-full shrink-0 text-xs" style="background:${meta.g}">${code}</div>
          <div class="flex-1 min-w-0">
            <div class="font-bold text-sm leading-tight">${meta.n}</div>
            <div class="text-[10px] text-gray-500">${meta.c}</div>
          </div>
          <div class="font-display text-2xl font-bold ${isWinner ? 'text-[var(--crimson-bright)]' : isLeader ? 'text-white' : 'text-gray-500'}">${wins}</div>
          ${isWinner ? '<span class="text-[var(--crimson-bright)] text-xs font-bold ml-1">✓</span>' : ''}
        </div>`;
    };

    // シリーズステータスバッジ
    const statusHtml = (() => {
      if (series.done) {
        const winner = topWinner ? s.top : s.bot;
        return `<span class="text-xs font-bold text-[var(--crimson-bright)]">${winner} が勝ち抜け</span>`;
      }
      if (series.topWins === 0 && series.botWins === 0)
        return `<span class="text-xs text-gray-600">開始前</span>`;
      return `<span class="text-xs text-gray-400">${s.text}</span>`;
    })();

    const gameLink = s.latestGameId
      ? `<a href="game.html?id=${s.latestGameId}" class="text-[10px] text-[var(--crimson-bright)] hover:underline shrink-0">試合詳細 ›</a>`
      : '';

    return `
      <div class="bg-[var(--ink-2)] border border-[var(--line)] rounded-xl overflow-hidden ${series.done ? 'series-done' : ''} hover:border-gray-600 transition-colors">
        <div class="flex items-center justify-between px-4 pt-3 pb-1">
          <span class="text-[10px] text-gray-600 font-bold uppercase tracking-wider">${s.label}</span>
          ${gameLink}
        </div>
        <div class="divide-y divide-[var(--line)]">
          ${teamRow(s.top, top, series.topWins, true)}
          ${teamRow(s.bot, bot, series.botWins, false)}
        </div>
        <div class="px-4 py-2 border-t border-[var(--line)]">
          ${statusHtml}
        </div>
      </div>`;
  }

  /* TBDカード */
  function tbdCard(label) {
    return `
      <div class="bg-[var(--ink-2)] border border-dashed border-[var(--line)] rounded-xl overflow-hidden">
        <div class="px-4 pt-3 pb-1">
          <span class="text-[10px] text-gray-600 font-bold uppercase tracking-wider">${label}</span>
        </div>
        <div class="divide-y divide-[var(--line)]">
          <div class="flex items-center gap-3 px-4 py-3">
            <div class="w-9 h-9 rounded-full bg-[var(--ink-3)] shrink-0"></div>
            <div class="flex-1">
              <div class="w-24 h-3 skeleton rounded"></div>
            </div>
            <div class="font-display text-2xl font-bold text-gray-700">–</div>
          </div>
          <div class="flex items-center gap-3 px-4 py-3">
            <div class="w-9 h-9 rounded-full bg-[var(--ink-3)] shrink-0"></div>
            <div class="flex-1">
              <div class="w-24 h-3 skeleton rounded"></div>
            </div>
            <div class="font-display text-2xl font-bold text-gray-700">–</div>
          </div>
        </div>
        <div class="px-4 py-2 border-t border-[var(--line)]">
          <span class="text-xs text-gray-700">TBD</span>
        </div>
      </div>`;
  }

  /* ラウンドカラムを生成 */
  function roundColumn(title, cards, isLast = false) {
    return `
      <div class="flex flex-col gap-3" style="min-width:220px; flex:1;">
        <div class="text-[10px] font-bold text-gray-500 uppercase tracking-widest text-center pb-1 border-b border-[var(--line)]">${title}</div>
        <div class="flex flex-col gap-3 ${isLast ? 'justify-center flex-1' : ''}">
          ${cards.join('')}
        </div>
      </div>`;
  }

  /* ブラケット描画 */
  function renderBracket(data) {
    const confLabels = { r1:'1st Round', r2:'2nd Round', cf:'Conf. Finals' };

    ['east', 'west'].forEach(conf => {
      const container = document.getElementById(`${conf}-bracket`);
      const rounds = [];

      // First Round
      const r1 = (data[conf].r1 || []).map(s => matchupCard(s));
      while (r1.length < 4) r1.push(tbdCard('First Round'));
      rounds.push(roundColumn('1st Round', r1));

      // Second Round
      const r2 = (data[conf].r2 || []).map(s => matchupCard(s));
      while (r2.length < 2) r2.push(tbdCard('2nd Round'));
      rounds.push(roundColumn('2nd Round', r2));

      // Conf Finals
      const cf = (data[conf].cf || []).map(s => matchupCard(s));
      if (!cf.length) cf.push(tbdCard('Conf. Finals'));
      rounds.push(roundColumn('Conf. Finals', cf, true));

      container.innerHTML = rounds.join('');
    });

    // NBA Finals
    const finalsContainer = document.getElementById('finals-bracket');
    const finals = data.finals || [];
    if (finals.length) {
      finalsContainer.innerHTML = finals.map(s => matchupCard(s, true)).join('');
    } else {
      finalsContainer.innerHTML = tbdCard('NBA Finals');
    }

    // サブタイトル更新
    const r1Count = (data.east?.r1?.length || 0) + (data.west?.r1?.length || 0);
    document.getElementById('bracket-subtitle').textContent =
      `第1ラウンド ${r1Count}シリーズ進行中 · 2026`;
  }

  /* メイン */
  async function init() {
    try {
      const r = await fetch('/api/bracket', { cache: 'no-store' });
      const data = await r.json();
      renderBracket(data);
      document.getElementById('loading').classList.add('hidden');
      document.getElementById('bracket-content').classList.remove('hidden');
    } catch (e) {
      document.getElementById('bracket-subtitle').textContent = 'データ取得に失敗しました';
      console.error(e);
    }
  }

  init();
  // 60秒ごとに更新
  setInterval(init, 60_000);
})();
</script>
</body>
</html>
