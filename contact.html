<!doctype html>
<html lang="ja">
<head>
  <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-1530445077032503" crossorigin="anonymous"></script>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>お問い合わせ | CourtSide</title>
  <meta name="description" content="CourtSide へのお問い合わせはこちら。" />
  <meta name="robots" content="noindex" />
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700;900&family=Oswald:wght@500;700&display=swap" rel="stylesheet" />
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🏀</text></svg>" />
  <style>
    :root {
      --crimson: #BF0000;
      --crimson-bright: #E60012;
      --ink: #0A0A0A;
      --ink-2: #121212;
      --ink-3: #1C1C1C;
      --line: #2A2A2A;
    }
    body { background: var(--ink); color: #fff; font-family: 'Noto Sans JP', sans-serif; }
    .font-display { font-family: 'Oswald', sans-serif; }
    input, textarea, select {
      background: var(--ink-3);
      border: 1px solid var(--line);
      color: #fff;
      border-radius: 6px;
      padding: 10px 14px;
      width: 100%;
      font-family: inherit;
      font-size: 14px;
      outline: none;
      transition: border-color .15s;
    }
    input:focus, textarea:focus, select:focus {
      border-color: var(--crimson-bright);
    }
    input::placeholder, textarea::placeholder { color: #555; }
  </style>
</head>
<body class="min-h-screen">

<!-- TOP BAR -->
<div class="bg-black border-b border-[var(--line)] text-xs text-gray-300">
  <div class="max-w-[1280px] mx-auto px-4 py-2 flex items-center justify-between">
    <span class="hidden sm:inline">2026 NBA プレーオフ 第1ラウンド 開幕中</span>
    <a href="contact.html" class="hover:text-white">お問い合わせ</a>
  </div>
</div>

<!-- HEADER -->
<header class="sticky top-0 z-40 bg-black/95 backdrop-blur border-b border-[var(--line)]">
  <div class="max-w-[1280px] mx-auto px-4 flex items-center gap-6 h-16">
    <a href="index.html" class="flex items-center gap-2 shrink-0">
      <img src="logo.png" alt="CourtSide" class="w-9 h-9 rounded-full">
      <div class="flex flex-col leading-none">
        <img src="logo-text.png" alt="CourtSide" class="h-6 w-auto">
        <span class="text-[10px] text-gray-400 font-medium tracking-widest uppercase">NBA速報</span>
      </div>
    </a>
    <nav class="hidden lg:flex items-center gap-6 text-sm font-medium">
      <a href="index.html" class="text-gray-300 hover:text-white">ホーム</a>
      <a href="schedule.html" class="text-gray-300 hover:text-white">試合日程</a>
      <a href="bracket.html" class="text-gray-300 hover:text-white">プレイオフ</a>
    </nav>
    <div class="flex-1"></div>
    <!-- ハンバーガーボタン（モバイル） -->
    <button id="menu-btn" class="lg:hidden flex flex-col gap-1.5 p-2 ml-auto" aria-label="メニュー">
      <span class="w-6 h-0.5 bg-white block"></span>
      <span class="w-6 h-0.5 bg-white block"></span>
      <span class="w-6 h-0.5 bg-white block"></span>
    </button>
  </div>
  <!-- モバイルメニュードロワー -->
  <div id="mobile-menu" class="hidden lg:hidden bg-black/98 border-t border-[var(--line)] px-4 py-4 flex flex-col gap-4 text-sm font-medium">
    <a href="index.html" class="text-gray-300 py-2 border-b border-[var(--line)]">🏠 ホーム</a>
    <a href="schedule.html" class="text-gray-300 py-2 border-b border-[var(--line)]">🗓 試合日程</a>
    <a href="bracket.html" class="text-gray-300 py-2 border-b border-[var(--line)]">🏆 プレイオフ</a>
    <a href="glossary.html" class="text-gray-300 py-2 border-b border-[var(--line)]">📖 用語集</a>
    <a href="watch-nba.html" class="text-gray-300 py-2 border-b border-[var(--line)]">📺 観戦ガイド</a>
    <a href="playoff-guide.html" class="text-gray-300 py-2 border-b border-[var(--line)]">📋 プレイオフ解説</a>
    <a href="contact.html" class="text-gray-300 py-2">✉️ お問い合わせ</a>
  </div>
</header>
<script>
(function(){
  const btn = document.getElementById('menu-btn');
  const menu = document.getElementById('mobile-menu');
  if(btn && menu) btn.addEventListener('click', () => menu.classList.toggle('hidden'));
})();
</script>

<!-- CONTENT -->
<main class="max-w-[640px] mx-auto px-4 py-14 md:py-20">
  <div class="mb-10">
    <h1 class="font-display text-4xl font-bold mb-2">お問い合わせ</h1>
    <p class="text-gray-400 text-sm">ご質問・ご意見・不具合報告などお気軽にどうぞ。<br />通常2〜3営業日以内にご返信いたします。</p>
  </div>

  <!-- フォーム (Formspree) -->
  <!-- ※ Formspree でフォームを作成し、下の YOUR_FORM_ID を置き換えてください -->
  <form action="https://formspree.io/f/mgordqbd" method="POST" id="contact-form">
    <div class="space-y-5">

      <div>
        <label class="block text-sm font-bold mb-2">お名前 <span class="text-[var(--crimson-bright)]">*</span></label>
        <input type="text" name="name" required placeholder="山田 太郎" />
      </div>

      <div>
        <label class="block text-sm font-bold mb-2">メールアドレス <span class="text-[var(--crimson-bright)]">*</span></label>
        <input type="email" name="email" required placeholder="example@email.com" />
      </div>

      <div>
        <label class="block text-sm font-bold mb-2">お問い合わせ種別</label>
        <select name="category">
          <option value="general">一般的なご質問</option>
          <option value="bug">不具合・エラー報告</option>
          <option value="feature">機能のご要望</option>
          <option value="other">その他</option>
        </select>
      </div>

      <div>
        <label class="block text-sm font-bold mb-2">メッセージ <span class="text-[var(--crimson-bright)]">*</span></label>
        <textarea name="message" rows="6" required placeholder="お問い合わせ内容をご記入ください"></textarea>
      </div>

      <input type="hidden" name="_subject" value="CourtSide お問い合わせ" />
      <input type="hidden" name="_next" value="https://courtsidelive.jp/contact.html?sent=1" />

      <button type="submit"
        class="w-full bg-[var(--crimson)] hover:bg-[var(--crimson-bright)] text-white font-bold py-3 rounded text-sm transition">
        送信する
      </button>

    </div>
  </form>

  <!-- 送信完了メッセージ -->
  <div id="sent-msg" class="hidden mt-6 p-5 bg-green-900/40 border border-green-700 rounded-lg text-green-300 text-sm">
    ✅ お問い合わせを受け付けました。返信までしばらくお待ちください。
  </div>

</main>

<!-- FOOTER -->
<footer class="bg-black border-t border-[var(--line)] py-8 mt-10">
  <div class="max-w-[1280px] mx-auto px-4 flex flex-col md:flex-row justify-between items-center gap-4 text-xs text-gray-500">
    <div>© 2026 CourtSide. All rights reserved.</div>
    <div class="flex gap-4">
      <a href="about.html" class="hover:text-white">サイトについて</a>
      <a href="privacy.html" class="hover:text-white">プライバシーポリシー</a>
      <a href="terms.html" class="hover:text-white">利用規約</a>
      <a href="contact.html" class="hover:text-white">お問い合わせ</a>
    </div>
  </div>
</footer>

<script>
  // 送信完了パラメータ検出
  if (new URLSearchParams(location.search).get('sent') === '1') {
    document.getElementById('contact-form').classList.add('hidden');
    document.getElementById('sent-msg').classList.remove('hidden');
  }
</script>
</body>
</html>
